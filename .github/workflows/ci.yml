name: CI Pipeline

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Setup Python
      uses: actions/setup-python@v4
      with: 
        python-version: '3.10'
    - name: Install
      run: | 
          python -m pip install --upgrade pip 
          pip install poetry
          poetry install
    - name: Test
      run: make test
    - name: Build
      run: make build